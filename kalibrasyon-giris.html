<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matematik Avı — Kalibrasyon Girişi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#04030d;color:#eef1ff;font-family:'Baloo 2',sans-serif;-webkit-font-smoothing:antialiased;}
  body{background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(80,40,160,0.30), transparent 60%),
    radial-gradient(ellipse 60% 40% at 12% 30%, rgba(255,74,214,0.07), transparent 60%),
    radial-gradient(ellipse 60% 40% at 88% 70%, rgba(0,235,255,0.07), transparent 60%),
    linear-gradient(180deg,#05040f,#040309 60%,#06040d);}

  /* ===== KALİBRASYON EKRANI ===== */
  .mk-stage{position:fixed;inset:0;overflow:hidden;container-type:size;}
  .mk-floaters span{position:absolute;font-family:'Baloo 2',sans-serif;font-weight:700;user-select:none;pointer-events:none;}

  @keyframes mk-breathe{0%,100%{transform:scale(1);filter:brightness(1);}50%{transform:scale(1.035);filter:brightness(1.12);}}
  @keyframes mk-drift{0%{transform:translateY(8px) rotate(0deg);}100%{transform:translateY(-26px) rotate(8deg);}}
  @keyframes mk-twinkle{0%,100%{opacity:0.18;}50%{opacity:0.5;}}
  @keyframes mk-pulse-dot{0%,100%{opacity:0.35;}50%{opacity:1;}}
  @keyframes mk-tickspin{to{transform:rotate(360deg);}}
  @keyframes mk-ringcw{to{transform:rotate(360deg);}}
  @keyframes mk-ringccw{to{transform:rotate(-360deg);}}
  @keyframes mk-dotbreathe{0%,100%{transform:translate(-50%,-50%) scale(1);filter:brightness(1);}50%{transform:translate(-50%,-50%) scale(1.18);filter:brightness(1.15);}}
</style>
</head>
<body>
<!--
  ENTEGRASYON
  -----------
  1. Bu dosyadaki <style>, .mk-stage markup'ı ve <script> bloğunu projenize taşıyın.
  2. El takibiniz (kamera) merceğin x/y konumunu MatematikKalibrasyon.setPointer(x, y) ile besler
     (x,y = .mk-stage içindeki piksel konumu). Fare ile test için aşağıdaki kod hazır.
  3. Kullanıcı elini KAPATTIĞINDA MatematikKalibrasyon.fist() çağırın (fare: tıklama).
  4. Tarama bitince 'kalibrasyon-tamam' event'i ve onComplete callback'i tetiklenir →
     kendi oyun ekranınıza geçin.
-->
<div class="mk-stage" id="mk-stage">

  <!-- arka plan rakamları -->
  <div class="mk-floaters" id="mk-floaters" style="position:absolute;inset:0;z-index:5;"></div>

  <!-- üst durum (3 aşama: TARAMA BEKLENİYOR → TARANIYOR · %n → ERİŞİM SAĞLANDI) -->
  <div id="mk-lock" style="position:absolute;top:6cqmin;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:1.6cqmin;font-family:'JetBrains Mono',monospace;font-size:2.1cqmin;letter-spacing:0.34em;color:#7aa9ff;text-transform:uppercase;">
    <span style="width:1.2cqmin;height:1.2cqmin;border-radius:50%;background:#00EBFF;box-shadow:0 0 12px #00EBFF;animation:mk-pulse-dot 1.6s ease-in-out infinite;"></span>TARAMA BEKLENİYOR
  </div>

  <!-- merkez kolon -->
  <div style="position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;">

    <!-- biyometrik hedef -->
    <div id="mk-target" style="position:relative;width:36cqmin;height:36cqmin;display:flex;align-items:center;justify-content:center;will-change:transform;transition:transform 0.25s cubic-bezier(.2,.9,.25,1);">
      <!-- yumuşak halo -->
      <div id="mk-halo" style="position:absolute;inset:-34%;border-radius:50%;background:radial-gradient(circle,rgba(0,235,255,0.26),transparent 62%);opacity:0.6;transition:opacity 0.4s;pointer-events:none;"></div>
      <!-- partikül katmanı -->
      <div id="mk-fx" style="position:absolute;inset:-40%;pointer-events:none;overflow:visible;z-index:4;"></div>
      <!-- dış kesik halka (yavaş döner) -->
      <div style="position:absolute;inset:0;border-radius:50%;border:1.5px dashed rgba(125,243,255,0.55);box-shadow:0 0 14px rgba(0,235,255,0.18);animation:mk-tickspin 22s linear infinite;pointer-events:none;"></div>
      <!-- ilerleme halkası (tarama sırasında belirir) -->
      <div id="mk-ring" style="position:absolute;inset:2%;border-radius:50%;background:conic-gradient(from -90deg,#00EBFF 0deg,#7df3ff var(--p,0deg),rgba(140,160,220,0.07) var(--p,0deg));-webkit-mask:radial-gradient(circle,transparent 0 46%,#000 47% 50%,transparent 51%);mask:radial-gradient(circle,transparent 0 46%,#000 47% 50%,transparent 51%);opacity:0;transition:opacity 0.3s;pointer-events:none;"></div>
      <!-- iç bölge (el yerleştirme) -->
      <div style="position:absolute;inset:13%;border-radius:50%;overflow:hidden;background:radial-gradient(circle,rgba(24,36,80,0.55),rgba(7,9,24,0.72));border:1.5px solid rgba(150,200,255,0.34);box-shadow:inset 0 0 34px rgba(0,235,255,0.22);display:flex;align-items:center;justify-content:center;">
        <!-- iç içe dönen 3 eğri -->
        <svg id="mk-fp" viewBox="0 0 100 100" style="position:absolute;width:72%;height:72%;opacity:0.95;filter:drop-shadow(0 0 3px rgba(125,243,255,0.55));transition:opacity 0.3s,filter 0.3s;" fill="none" stroke="url(#mkfp)" stroke-width="2.2" stroke-linecap="round">
          <defs><linearGradient id="mkfp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7df3ff"></stop><stop offset="1" stop-color="#ff8fe4"></stop></linearGradient></defs>
          <circle cx="50" cy="50" r="32" stroke-dasharray="84 42" style="transform-box:fill-box;transform-origin:center;animation:mk-ringcw 9s linear infinite;"></circle>
          <circle cx="50" cy="50" r="23" stroke-dasharray="56 30" style="transform-box:fill-box;transform-origin:center;animation:mk-ringccw 6.5s linear infinite;"></circle>
          <circle cx="50" cy="50" r="14" stroke-dasharray="32 18" style="transform-box:fill-box;transform-origin:center;animation:mk-ringcw 4s linear infinite;"></circle>
        </svg>
        <!-- merkez nokta -->
        <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2.2cqmin;height:2.2cqmin;border-radius:50%;background:#fff;box-shadow:0 0 18px #fff,0 0 36px rgba(0,235,255,0.95),0 0 56px rgba(0,235,255,0.5);animation:mk-dotbreathe 1.9s ease-in-out infinite;"></div>
        <!-- yüzde -->
        <div id="mk-pct" style="position:absolute;bottom:12%;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:3cqmin;letter-spacing:0.08em;color:#7df3ff;opacity:0;transition:opacity 0.3s;text-shadow:0 0 12px rgba(0,235,255,0.7);">0%</div>
      </div>
    </div>

    <!-- yönlendirme metni -->
    <div id="mk-status" style="margin-top:6.5cqmin;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:4.4cqmin;line-height:1;color:#eaf6ff;text-shadow:0 0 22px rgba(0,235,255,0.65),0 0 40px rgba(0,235,255,0.35);transition:color 0.25s;white-space:nowrap;">ELİNİZİ ORTAYA GETİRİN</div>
  </div>
</div>

<script>
(function(){
  const stage  = document.getElementById('mk-stage');
  const target = document.getElementById('mk-target');
  const halo   = document.getElementById('mk-halo');
  const ring   = document.getElementById('mk-ring');
  const fp     = document.getElementById('mk-fp');
  const pct    = document.getElementById('mk-pct');
  const fx     = document.getElementById('mk-fx');
  const status = document.getElementById('mk-status');
  const lock   = document.getElementById('mk-lock');

  let pointer = {x:0, y:0, present:false};
  let armed = false;
  let scanning = false;
  let calRaf = null, calPart = null, calDone = null;
  let onComplete = null;

  // ---- arka plan rakamları ----
  (function buildFloaters(){
    const host = document.getElementById('mk-floaters');
    const glyphs = ['7','3','½','π','%','9','4','=','∞','8','¾','+','×','2','√'];
    const cols = ['rgba(125,243,255,0.5)','rgba(159,95,255,0.5)','rgba(255,143,228,0.45)'];
    let html = '';
    for(let i=0;i<26;i++){
      const g = glyphs[Math.floor(Math.random()*glyphs.length)];
      html += '<span style="left:'+(Math.random()*96)+'%;top:'+(Math.random()*92)+'%;'
        + 'font-size:'+(2.2+Math.random()*4)+'cqmin;color:'+cols[Math.floor(Math.random()*cols.length)]+';'
        + 'opacity:'+(0.18+Math.random()*0.32)+';'
        + 'animation:mk-drift '+(5+Math.random()*5)+'s ease-in-out '+(Math.random()*3)+'s infinite alternate, '
        + 'mk-twinkle '+(2.5+Math.random()*3)+'s ease-in-out infinite;">'+g+'</span>';
    }
    host.innerHTML = html;
  })();

  // ---- merceği hedefe yaklaştırınca "armed" ----
  function updateArm(){
    if(scanning) return;
    const r = stage.getBoundingClientRect();
    const cx = r.width*0.5, cy = r.height*0.5;
    const d = Math.hypot(pointer.x-cx, pointer.y-cy);
    armed = pointer.present && d < r.width*0.13;
    target.style.transform = armed ? 'scale(1.07)' : 'scale(1)';
    halo.style.opacity     = armed ? '1' : '0.6';
    if(armed){ status.textContent='ŞİMDİ ELİNİZİ KAPATIN'; status.style.color='#7df3ff'; }
    else     { status.textContent='ELİNİZİ ORTAYA GETİRİN'; status.style.color='#eaf6ff'; }
  }

  // ---- tarama ----
  function startScan(){
    if(scanning || !armed) return;
    scanning = true; armed = false;

    target.style.transform = 'scale(1.05)';
    halo.style.opacity = '1';
    halo.style.background = 'radial-gradient(circle,rgba(0,235,255,0.42),rgba(125,243,255,0.12) 40%,transparent 66%)';
    ring.style.opacity = '1';
    pct.style.opacity = '1';
    lock.innerHTML = '<span style="width:1.2cqmin;height:1.2cqmin;border-radius:50%;background:#FFC83D;box-shadow:0 0 12px #FFC83D;"></span>TARANIYOR · <span id="mk-locknum">0</span>%';
    lock.style.color = '#FFC83D';
    status.textContent = 'TARAMA YAPILIYOR';
    status.style.color = '#FFC83D';
    status.style.textShadow = '0 0 22px rgba(255,200,61,0.65),0 0 40px rgba(255,200,61,0.3)';

    fp.style.filter = 'drop-shadow(0 0 8px rgba(125,243,255,1)) drop-shadow(0 0 18px rgba(0,235,255,0.85))';
    const circ = fp.querySelectorAll('circle'); const fast = ['1.4s','1s','0.6s'];
    circ.forEach((c,i)=>{ c.style.animationDuration = fast[i] || '1s'; });

    startParticles();

    const dur = 2500, t0 = performance.now();
    const step = (now)=>{
      const p = Math.min(1, (now-t0)/dur);
      const e = p<0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      ring.style.setProperty('--p', (e*360).toFixed(1)+'deg');
      const pv = Math.round(e*100);
      pct.textContent = pv+'%';
      const ln = document.getElementById('mk-locknum'); if(ln) ln.textContent = pv;
      if(p<1){ calRaf = requestAnimationFrame(step); }
      else { finishScan(); }
    };
    calRaf = requestAnimationFrame(step);
  }

  function startParticles(){
    const cols = ['#7df3ff','#9be9ff','#ff8fe4','#ffffff'];
    const spawn = ()=>{
      const n = 1 + Math.floor(Math.random()*2);
      for(let i=0;i<n;i++){
        const s = document.createElement('span');
        const sz = (1.4+Math.random()*2.2).toFixed(1);
        const col = cols[Math.floor(Math.random()*cols.length)];
        s.style.cssText = 'position:absolute;left:50%;top:50%;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';box-shadow:0 0 6px '+col+',0 0 12px '+col+';pointer-events:none;';
        fx.appendChild(s);
        const ang = Math.random()*Math.PI*2;
        const dist = fx.clientWidth*(0.22+Math.random()*0.26);
        const a = s.animate([
          {transform:'translate(-50%,-50%) translate(0,0) scale(0.4)',opacity:0},
          {opacity:1,offset:0.18},
          {transform:'translate(-50%,-50%) translate('+Math.cos(ang)*dist+'px,'+Math.sin(ang)*dist+'px) scale(1)',opacity:0}
        ],{duration:900+Math.random()*700, easing:'cubic-bezier(.2,.7,.3,1)'});
        a.onfinish = ()=>s.remove();
      }
    };
    spawn();
    calPart = setInterval(spawn, 150);
  }

  function stopParticles(){
    clearInterval(calPart);
    fx.innerHTML = '';
  }

  function finishScan(){
    stopParticles();
    halo.style.background = 'radial-gradient(circle,rgba(52,245,166,0.34),transparent 62%)';

    // tatmin edici bitiş
    target.animate([
      {transform:'scale(1.05)'},{transform:'scale(1.14)',offset:0.35},{transform:'scale(1)'}
    ],{duration:520, easing:'cubic-bezier(.25,1.3,.4,1)'});
    halo.animate([
      {opacity:1,filter:'brightness(1)'},{opacity:1,filter:'brightness(2.2)',offset:0.25},{opacity:1,filter:'brightness(1)'}
    ],{duration:520, easing:'ease-out'});
    for(let i=0;i<2;i++){
      const w = document.createElement('span');
      const col = i===0 ? '#34F5A6' : '#7df3ff';
      w.style.cssText = 'position:absolute;left:50%;top:50%;width:30%;height:30%;border-radius:50%;border:2px solid '+col+';box-shadow:0 0 18px '+col+';pointer-events:none;';
      fx.appendChild(w);
      const a = w.animate([
        {transform:'translate(-50%,-50%) scale(0.5)',opacity:0.95},
        {transform:'translate(-50%,-50%) scale(2.3)',opacity:0}
      ],{duration:620, delay:i*120, easing:'cubic-bezier(.2,.7,.3,1)'});
      a.onfinish = ()=>w.remove();
    }
    for(let i=0;i<14;i++){
      const s = document.createElement('span');
      s.style.cssText = 'position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:50%;background:#aef9d8;box-shadow:0 0 8px #34F5A6;pointer-events:none;';
      fx.appendChild(s);
      const ang = (i/14)*Math.PI*2, dist = fx.clientWidth*(0.28+Math.random()*0.12);
      const a = s.animate([
        {transform:'translate(-50%,-50%) translate(0,0) scale(1)',opacity:1},
        {transform:'translate(-50%,-50%) translate('+Math.cos(ang)*dist+'px,'+Math.sin(ang)*dist+'px) scale(0.3)',opacity:0}
      ],{duration:560, easing:'cubic-bezier(.15,.8,.3,1)'});
      a.onfinish = ()=>s.remove();
    }

    fp.style.filter = 'drop-shadow(0 0 6px rgba(52,245,166,1)) drop-shadow(0 0 14px rgba(52,245,166,0.7))';
    const circ = fp.querySelectorAll('circle'); const base = ['9s','6.5s','4s'];
    circ.forEach((c,i)=>{ c.style.animationDuration = base[i] || '6s'; });

    pct.textContent = '100%';
    status.textContent = 'TARAMA TAMAMLANDI';
    status.style.color = '#34F5A6';
    status.style.textShadow = '0 0 24px rgba(52,245,166,0.7),0 0 44px rgba(52,245,166,0.35)';
    lock.innerHTML = '<span style="width:1.2cqmin;height:1.2cqmin;border-radius:50%;background:#34F5A6;box-shadow:0 0 12px #34F5A6;"></span>ERİŞİM SAĞLANDI';
    lock.style.color = '#34F5A6';

    clearTimeout(calDone);
    calDone = setTimeout(()=>{
      scanning = false;
      stage.dispatchEvent(new CustomEvent('kalibrasyon-tamam', {bubbles:true}));
      if(typeof onComplete === 'function') onComplete();
    }, 1050);
  }

  function reset(){
    clearTimeout(calDone); clearInterval(calPart); cancelAnimationFrame(calRaf);
    scanning = false; armed = false; fx.innerHTML = '';
    ring.style.opacity = '0'; pct.style.opacity = '0'; pct.textContent = '0%';
    ring.style.setProperty('--p','0deg');
    halo.style.opacity = '0.6';
    halo.style.background = 'radial-gradient(circle,rgba(0,235,255,0.26),transparent 62%)';
    fp.style.filter = 'drop-shadow(0 0 3px rgba(125,243,255,0.55))';
    fp.querySelectorAll('circle').forEach((c,i)=>{ c.style.animationDuration = ['9s','6.5s','4s'][i]; });
    target.style.transform = 'scale(1)';
    status.textContent = 'ELİNİZİ ORTAYA GETİRİN'; status.style.color = '#eaf6ff';
    status.style.textShadow = '0 0 22px rgba(0,235,255,0.65),0 0 40px rgba(0,235,255,0.35)';
    lock.innerHTML = '<span style="width:1.2cqmin;height:1.2cqmin;border-radius:50%;background:#00EBFF;box-shadow:0 0 12px #00EBFF;animation:mk-pulse-dot 1.6s ease-in-out infinite;"></span>TARAMA BEKLENİYOR';
    lock.style.color = '#7aa9ff';
  }

  // ===== GENEL API =====
  window.MatematikKalibrasyon = {
    // El takibinden mercek konumunu besle (.mk-stage içi piksel)
    setPointer(x, y){ pointer.x = x; pointer.y = y; pointer.present = true; updateArm(); },
    clearPointer(){ pointer.present = false; updateArm(); },
    // El kapandığında çağır → mercek hedefteyse tarama başlar
    fist(){ startScan(); },
    // Tarama tamamlanınca tetiklenecek callback
    onComplete(cb){ onComplete = cb; },
    reset
  };

  // ===== FARE İLE TEST (gerçek el takibinde kaldırın) =====
  stage.addEventListener('mousemove', (e)=>{
    const r = stage.getBoundingClientRect();
    MatematikKalibrasyon.setPointer(e.clientX-r.left, e.clientY-r.top);
  });
  stage.addEventListener('mouseleave', ()=> MatematikKalibrasyon.clearPointer());
  stage.addEventListener('click', ()=> MatematikKalibrasyon.fist());

  // demo: tamamlanınca kısa süre sonra sıfırla (gerçek kodda oyun ekranına geçin)
  MatematikKalibrasyon.onComplete(()=>{ setTimeout(reset, 1400); });
})();
</script>
</body>
</html>
